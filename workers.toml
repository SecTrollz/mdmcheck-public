name            = "mdmcheck"
main            = "workers.js"
compatibility_date = "2025-01-01"
workers_dev     = false
route           = { pattern = "mdmcheck.pages.dev/api/*", zone_name = "pages.dev" }

[[kv_namespaces]]
binding = "KV"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[vars]
BASE_URL       = "https://mdmcheck.pages.dev"
ALLOWED_ORIGIN = "https://mdmcheck.pages.dev"

# Set these via: wrangler secret put <NAME>
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# MS_CLIENT_ID
# MS_CLIENT_SECRET
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
# SESSION_SECRET
